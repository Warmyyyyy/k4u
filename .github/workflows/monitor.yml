name: Ktown4u Stock Monitor

on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分钟运行一次
  workflow_dispatch:          # 允许手动触发

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 允许推送状态文件

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 运行监控脚本
        id: monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python monitor.py
        continue-on-error: true   # 允许脚本 exit(1) 后继续提交

      - name: 状态变化则提交文件
        if: steps.monitor.outcome == 'failure'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📝 更新商品状态文件"
          file_pattern: 'status/*.txt'
